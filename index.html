<style>

:root 
{
	--width: 2vw;
}
  
body 
{
	background-color:yellowgreen;
}

#r0 
{
	width: var(--width);
	height: 0;
	position: absolute;
	top: 50%;
	left: 50%;
	box-shadow: 0px 0px 0px 10px black;
}

#r1 
{
	width: var(--width);
	height: 0;
	position: absolute;
	top: 50%;
	left: 50%;
	box-shadow: 0px 0px 10px 20px grey;
}

#r2 
{
	width: var(--width);
	height: 0;
	position: absolute;
	top: 50%;
	left: 50%;
	box-shadow: 0px 0px 10px 30px grey;
}

#r3 
{
	width: var(--width);
	height: 0;
	position: absolute;
	top: 50%;
	left: 50%;
	box-shadow: 0px 0px 0px 40px black;
}

#r4 
{
	width: var(--width);
	height: 0;
	position: absolute;
	top: 50%;
	left: 50%;
	box-shadow: 0px 0px 10px 50px grey;
}


</style>

<body>
  <div id="r4"></div>
  <div id="r3"></div>
  <div id="r2"></div>
  <div id="r1"></div>
  <div id="r0"></div>
</body>

<script>
	let spreads = [10, 20, 30, 40, 50];
	let numRects = 5;

	updateSpreads(0);	
	printBoxShadows();

	/* printBoxShadows: prints the box shadow values of each rectangle.
		Helper function.
	 */
	function printBoxShadows()
	{
		for(let i = 0; i < numRects; i++)
		{	
			let element = document.getElementById("r" + i).style.boxShadow;
			console.log(element);
		}
	}

	/* updateSpreads: increases that spread ratios of the rectangles
		by the given amount
	*/
	function updateSpreads(incr) 
	{
		for(let i = 0; i < numRects; i++)
		{
		// updating spread element
		spreads[i] += incr;

		// updating DOM element
		let currBlur = 0
		let currCol = "black";
		if(i % 2 == 1)
		{
			currBlur = 10;
			currCol = "grey";
		}

		document.getElementById("r" + i).style.boxShadow
			= getBoxShadowString(currBlur, spreads[i], currCol);
		}
	}

	/* getBoxShadowString: produces a box shadow string value. 
		Helper function.
		
		blur: blur radius
		spread: spread radius
		col: color
		
		Returns box shadow string
	*/
	function getBoxShadowString(blur, spread, col) 
	{
		return "0px 0px " + blur + "px " + spread + "px " + col;
	}
  
</script>
